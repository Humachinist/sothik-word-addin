<!doctype html><html lang="bn"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>সঠিক ব্যাকরণ পরীক্ষক</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla&display=swap" rel="stylesheet"/><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Tiro Bangla","Segoe UI",sans-serif;background:#fff;height:100vh;overflow:hidden;color:#222;font-size:16px}#app{display:flex;flex-direction:column;height:100vh}.toolbar{display:flex;align-items:center;justify-content:left;gap:8px;padding:10px 12px;background:#fff;border-bottom:1px solid #e6e6e6;font-size:14px;font-weight:400;flex-shrink:0}.toolbar img{width:22px;height:22px;display:block}.stats{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid #e6e6e6;background:#fff;flex-shrink:0}.stat-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:#888;color:#fff;font-size:20px;font-weight:400;flex-shrink:0}.stat-label{font-size:16px;color:#444}#loading-state{text-align:center;padding:10px 14px;color:#888;font-size:13px;border-bottom:1px solid #f0f0f0;flex-shrink:0}#error-container{flex:1;overflow-y:auto}.error-item{padding:12px 14px;border-bottom:1px solid #eee;cursor:pointer;transition:background .12s}.error-item:hover{background:#fafafa}.error-item.active{background:#f0f7ff}.ctx-line{font-size:14px;line-height:1.8;color:#444;margin-bottom:10px;word-break:break-word}.ctx-neutral{color:#444}.ctx-wrong{color:#999;text-decoration:line-through;text-decoration-color:#bbb;text-decoration-thickness:1px}.ctx-right{font-weight:700;color:#111}.ctx-sep{color:#bbb;font-size:12px}.action-row{display:flex;gap:12px;align-items:center}.btn-accept{padding:1px 6px;background:rgba(0,120,212,.06);color:#0078d4;border:.5px solid rgba(0,120,212,.35);font-family:inherit;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap;border-radius:4px;transition:background .15s,border-color .15s}.btn-accept:hover{background:rgba(0,120,212,.12);border-color:rgba(0,120,212,.6)}.btn-ignore{padding:0;background:0 0;color:#555;border:none;font-family:inherit;font-size:10px;cursor:pointer;white-space:nowrap;transition:color .15s}.btn-ignore:hover{color:red}.btn-alt-sug{padding:1px 6px;background:0 0;color:#555;border:.5px solid #ccc;font-family:inherit;font-size:13px;font-weight:400;cursor:pointer;white-space:nowrap;border-radius:4px;transition:background .15s,border-color .15s,color .15s}.btn-alt-sug:hover{background:rgba(0,0,0,.05);border-color:#999;color:#222}.btn-ignore:hover{color:red;border-color:#999}.state{text-align:center;padding:30px 20px;color:#888;font-size:13px;line-height:1.8}#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:7px 14px;font-size:12px;border-radius:3px;display:none;white-space:nowrap;z-index:999}#toast.show{display:block}</style><script defer="defer" src="polyfill.js"></script><script defer="defer" src="taskpane.js"></script></head><body><div id="app"><div class="toolbar"><img src="https://sothik-word-addin.vercel.app/assets/icon-32.png"/> <span>সঠিক ব্যাকরণ পরীক্ষক</span></div><div class="stats"><span class="stat-badge" id="stat-errors">০</span> <span class="stat-label">প্রস্তাবিত সংশোধন</span></div><div id="loading-state">বানান যাচাই করা হচ্ছে...</div><div id="error-container"><div id="error-list"></div></div></div><div id="toast"></div><script src="9f296b6beae6def0691a.js"></script></body></html>
